name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby for CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod --version
        working-directory: ios/WeightLossBetting

      - name: Install pods
        run: pod install
        working-directory: ios/WeightLossBetting

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test -workspace WeightLossBetting.xcworkspace -scheme WeightLossBetting -destination 'platform=iOS Simulator,name=iPhone 14,OS=17.4' -quiet | xcpretty || true
        working-directory: ios/WeightLossBetting

